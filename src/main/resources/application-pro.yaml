spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/miccmsservice
        username: ${USER_NAME:pro_user}
        password: ${USER_PASSWORD:pro_password}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: none
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
        show-sql: false
    liquibase:
        enabled: false
    data:
        redis:
            host: localhost
            port: 6379
            timeout: 60000

currency-layer:
    api-url: https://api.currencylayer.com/live
    access-key: ${CURRENCY_LAYER_KEY}

logging:
    level:
        root: INFO

services:
    catalog:
        url: ${CATALOG_BASE_URL:http://localhost:6002}
