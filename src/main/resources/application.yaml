server:
    port: 6006

spring:
    application:
        name: mic-cmsservice
    banner:
        charset: UTF-8
    profiles:
        active: ${PROFILE:local},kibana
    cache:
        type: caffeine
        caffeine:
            spec: maximumSize=500,expireAfterAccess=600s
    kafka:
        listener:
            observation-enabled: true
        template:
            observation-enabled: true

management:
    tracing:
        sampling:
            probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
    otlp:
        tracing:
            endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
    endpoints:
        web:
            exposure:
                include: health,info,metrics,prometheus

logging:
    pattern:
        level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

---
spring:
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: ${JWT_ISSUER_URI:http://localhost:9000}
