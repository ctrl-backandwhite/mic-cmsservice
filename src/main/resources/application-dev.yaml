spring:
    datasource:
        url: ${PGDATABASE_URL}
        username: ${PGUSER}
        password: ${PGPASSWORD}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: none
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
        show-sql: true
    liquibase:
        enabled: true
    data:
        redis:
            host: ${REDIS_HOST:redis.railway.internal}
            port: ${REDIS_PORT:6379}
            database: ${REDIS_DATABASE:6}
            timeout: 60000

server:
    port: 8080
    ssl:
        enabled: false

currency-layer:
    api-url: https://api.currencylayer.com/live
    access-key: ${CURRENCY_LAYER_KEY}

logging:
    level:
        root: INFO
